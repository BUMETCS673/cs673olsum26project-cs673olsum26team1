version: '3.9'

services:
  # ---- PostgreSQL database ----
  db:
    image: postgres:16-alpine
    container_name: bariatricpath-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: app_user
      POSTGRES_PASSWORD: app_pass
      POSTGRES_DB: bariatricpath
    ports:
      - "5433:5433"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  # ---- Express backend ----
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: bariatricpath-backend
    restart: unless-stopped
    ports:
      - "5001:5001"
    environment:
      DATABASE_URL: "postgresql://app_user:app_pass@db:5432/bariatricpath"
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID}
      FIREBASE_CLIENT_EMAIL: ${FIREBASE_CLIENT_EMAIL}
      FIREBASE_PRIVATE_KEY: ${FIREBASE_PRIVATE_KEY}
      PORT: 5001
      NODE_ENV: development
      CLIENT_URL: "http://localhost:5173"
    depends_on:
      - db
    volumes:
      - ./server:/app
      - /app/node_modules

  # ---- React frontend ----
  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: bariatricpath-frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./client:/app
      - /app/node_modules

volumes:
  postgres-data: